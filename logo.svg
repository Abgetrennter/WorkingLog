<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b5797"/>
      <stop offset="100%" stop-color="#1d3b66"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background: Rounded rectangle resembling a modern app icon -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#bg-grad)" filter="url(#shadow)" />

  <!-- Notebook/Calendar representation: White rounded rect -->
  <rect x="20" y="20" width="60" height="60" rx="8" fill="#ffffff" />
  
  <!-- Accent header for the notebook -->
  <path d="M 20 28 Q 20 20 28 20 L 72 20 Q 80 20 80 28 L 80 35 L 20 35 Z" fill="#e8bb1b" />

  <!-- The "工" character integrated into the notebook design -->
  <g fill="#2b5797">
    <!-- Top horizontal bar -->
    <rect x="40" y="42" width="26" height="6" rx="2" />
    
    <!-- Vertical bar -->
    <rect x="50" y="48" width="6" height="18" rx="1" />
    
    <!-- Bottom horizontal bar -->
    <rect x="38" y="66" width="30" height="6" rx="2" />
  </g>

  <!-- Binding/Holes on the left side to look like a notebook -->
  <circle cx="28" cy="45" r="3" fill="#e0e0e0" />
  <circle cx="28" cy="55" r="3" fill="#e0e0e0" />
  <circle cx="28" cy="65" r="3" fill="#e0e0e0" />
  
</svg>